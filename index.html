<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --color-background-primary:#ffffff; --color-background-secondary:#F5F2EC; --color-background-tertiary:#EFEAE1;
  --color-text-primary:#1C1917; --color-text-secondary:#57534E; --color-text-tertiary:#A8A29E;
  --color-border-tertiary:rgba(28,25,23,0.12); --color-border-secondary:rgba(28,25,23,0.22);
  --border-radius-md:8px; --border-radius-lg:12px; --accent:#C2692A;
}
body { font-family:'Figtree',system-ui,sans-serif; color:var(--color-text-primary); background:var(--color-background-tertiary); overflow-x:hidden; overflow-wrap:break-word; }
html { overflow-x:hidden; }
.wrap { max-width:760px; margin:0 auto; min-height:100vh; background:var(--color-background-tertiary); box-shadow:0 0 40px rgba(0,0,0,0.06); }
h1,h2,h3 { font-family:'Fraunces',Georgia,serif; }

.top-bar { background:var(--color-background-primary); border-bottom:0.5px solid var(--color-border-tertiary); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; position:sticky; top:0; z-index:5; }
.tb-left { display:flex; align-items:center; gap:10px; min-width:0; flex:1; }
.back-btn { background:none; border:0.5px solid var(--color-border-secondary); border-radius:20px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--color-text-secondary); flex-shrink:0; }
.back-btn:hover { border-color:var(--accent); color:var(--accent); }
.trip-title { font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; min-width:0; font-family:'Fraunces',serif; }
.trip-title span.nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.trip-sub { font-size:12px; color:var(--color-text-secondary); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.add-btn { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; padding:8px 15px; border-radius:20px; background:var(--accent); color:white; border:none; cursor:pointer; flex-shrink:0; }
.add-btn:hover { opacity:.88; }
.add-btn i { font-size:15px; }

.tab-strip { display:flex; background:var(--color-background-primary); border-top:0.5px solid var(--color-border-tertiary); position:fixed; bottom:0; left:0; right:0; z-index:30; box-shadow:0 -2px 12px rgba(0,0,0,.06); padding-bottom:env(safe-area-inset-bottom); }
.tab { flex:1; padding:10px 4px; text-align:center; font-size:11px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:var(--color-text-tertiary); cursor:pointer; border-top:2px solid transparent; display:flex; flex-direction:column; align-items:center; gap:3px; transition:all .13s; }
.tab i { font-size:18px; }
.tab.on { color:var(--accent); border-top-color:var(--accent); }
.tab:hover:not(.on) { color:var(--color-text-secondary); }

.trips-header { padding:22px 16px 6px; }
.trips-header h1 { font-size:24px; font-weight:600; }
.trips-header p { font-size:13px; color:var(--color-text-secondary); margin-top:3px; font-family:'Figtree',sans-serif; }
.trips-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(158px,1fr)); gap:12px; padding:14px 16px 24px; }
.trip-card { border-radius:var(--border-radius-lg); border:0.5px solid var(--color-border-tertiary); overflow:hidden; cursor:pointer; background:var(--color-background-primary); transition:transform .14s; }
.trip-card:hover { transform:translateY(-3px); }
.trip-cover { height:78px; display:flex; align-items:center; justify-content:center; font-size:38px; position:relative; background-size:cover; background-position:center; }
.trip-status { position:absolute; top:8px; right:9px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; padding:3px 9px; border-radius:20px; background:rgba(255,255,255,.92); }
.trip-edit { position:absolute; top:8px; left:9px; width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,.92); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#57534E; font-size:14px; }
.trip-edit:hover { color:#C2692A; }
.trip-card-body { padding:12px 14px 14px; }
.trip-card-name { font-size:16px; font-weight:600; font-family:'Fraunces',serif; }
.trip-card-loc { font-size:12px; color:var(--color-text-secondary); margin-top:3px; display:flex; align-items:center; gap:4px; }
.trip-card-loc i { font-size:13px; }
.trip-card-foot { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:0.5px solid var(--color-border-tertiary); }
.trip-card-dates { font-size:11px; color:var(--color-text-tertiary); }
.trip-card-count { font-size:11px; font-weight:600; color:var(--accent); display:flex; align-items:center; gap:3px; }
.trip-card-count i { font-size:13px; }
.new-trip-card { border:1.5px dashed var(--color-border-secondary); border-radius:var(--border-radius-lg); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; color:var(--color-text-secondary); min-height:198px; transition:all .15s; }
.new-trip-card:hover { border-color:var(--accent); color:var(--accent); background:#FFF7F0; }
.new-trip-card i { font-size:32px; margin-bottom:8px; }
.new-trip-card span { font-size:13px; font-weight:600; }

.panel { padding:14px 16px calc(80px + env(safe-area-inset-bottom)); }
.day-header { display:flex; align-items:center; gap:10px; margin:14px 0 9px; }
.day-badge { background:var(--accent); color:white; font-size:11px; font-weight:700; padding:3px 11px; border-radius:20px; white-space:nowrap; }
.day-date { font-size:12px; color:var(--color-text-tertiary); }
.ev-card { background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:11px 13px; margin-bottom:8px; display:flex; gap:12px; align-items:flex-start; }
.ev-time { font-size:11px; font-weight:700; color:var(--color-text-tertiary); min-width:44px; padding-top:2px; }
.ev-content { flex:1; min-width:0; }
.ev-name { font-weight:600; font-size:14px; }
.ev-detail { font-size:12px; color:var(--color-text-secondary); margin-top:2px; }
.ev-tag { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; margin-top:6px; text-transform:uppercase; letter-spacing:.3px; }
.ev-del { background:none; border:none; cursor:pointer; color:var(--color-text-tertiary); font-size:15px; padding:2px; }
.ev-del:hover { color:#A32D2D; }
.ev-link { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:4px 11px; border-radius:20px; background:#E6F1FB; color:#185FA5; text-decoration:none; }
.ev-link:hover { background:#D4E8FB; }
.ev-link i { font-size:12px; }
.dir-btn { font-size:12px; font-weight:600; padding:7px 13px; border-radius:20px; border:0.5px solid var(--color-border-secondary); background:transparent; color:var(--color-text-primary); cursor:pointer; font-family:inherit; }
.dir-btn:hover { background:var(--color-background-secondary); border-color:#C2692A; color:#C2692A; }
.photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.photo-tile { position:relative; aspect-ratio:1; border-radius:var(--border-radius-md); overflow:hidden; cursor:pointer; background:var(--color-background-secondary); }
.photo-tile img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-cap { position:absolute; left:0; right:0; bottom:0; padding:12px 7px 5px; font-size:10px; line-height:1.3; color:#fff; background:linear-gradient(transparent, rgba(0,0,0,.66)); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chk-row { display:flex; align-items:center; gap:10px; padding:9px 4px; border-bottom:0.5px solid var(--color-border-tertiary); }
.chk-box { flex-shrink:0; width:23px; height:23px; border-radius:7px; border:1.5px solid var(--color-border-secondary); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:transparent; font-size:14px; transition:all .12s; }
.chk-box.on { background:#0F6E56; border-color:#0F6E56; color:#fff; }
.chk-text { flex:1; font-size:14px; cursor:pointer; }
.chk-done .chk-text { text-decoration:line-through; color:var(--color-text-tertiary); }
.overview { background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:14px; margin-bottom:16px; }

function mergeLists(target, incoming, sigFn, idHolder, idKey){ if(!Array.isArray(incoming)) return; if(idHolder[idKey]==null) idHolder[idKey]=(Math.max(0,...target.map(x=>x.id||0))+1); incoming.forEach(item=>{ const sig=sigFn(item); const idx=target.findIndex(x=>sigFn(x)===sig); if(idx===-1){ item.id=idHolder[idKey]++; target.push(item); } else { const cur=target[idx]; if((item.updatedAt||0)>(cur.updatedAt||0)){ item.id=cur.id; target[idx]=item; } } }); }

===-1){ evt.id=ex.nextEvId++; exd.events.push(evt); } else if((evt.updatedAt||0)>(exd.events[exi].updatedAt||0)){ evt.id=exd.events[exi].id; exd.events[exi]=evt; } }); exd.events.sort((a,b)=>a.time.localeCompare(b.time)); }); }); }

function downloadViewDoc(i){ const d=viewingDocs[i]; if(!d||!d.url) return; try{ const parts=d.url.split(','); const mime=(parts[0].match(/data:(.*?);base64/)||[])[1]||'application/octet-stream'; const bin=atob(parts[1]); const arr=new Uint8Array(bin.length); for(let j=0;j<bin.length;j++)arr[j]=bin.charCodeAt(j); const blob=new Blob([arr],{type:mime}); const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=d.name||'image.png'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),60000); }catch(e){ alert('Could not download.'); } }
function showEventDocs(di,id){ const trip=curTrip(); const d=trip.itinerary[di]; if(!d) return; const ev=d.events.find(e=>e.id===id); if(ev) showDocsViewer(ev.docs,ev.name); }
function showExpenseDocs(id){ const trip=curTrip(); const e=trip.budget.expenses.find(x=>x.id===id); if(e) showDocsViewer(e.docs,e.name); }
function directionsUrl(provider,q){ const e=encodeURIComponent(q); if(provider==='apple') return 'https://maps.apple.com/?daddr='+e; if(provider==='google') return 'https://www.google.com/maps/dir/?api=1&destination='+e; if(provider==='waze') return 'https://waze.com/ul?q='+e+'&navigate=yes'; return '#'; }
function openDirections(provider,id){ const m=curTrip().memories.find(x=>x.id===id); if(!m) return; const q=(m.address&&m.address.trim())?m.address:(m.name+(m.location?', '+m.location:'')); window.open(directionsUrl(provider,q),'_blank'); }
function directionsChooser(id){ const m=curTrip().memories.find(x=>x.id===id); if(!m) return; showModal(`<div class="overlay"><div class="modal" style="max-width:340px"><div class="modal-header"><h3>Get directions</h3><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px"><i class="ti ti-map-pin" style="font-size:14px;vertical-align:-2px;color:#C2692A"></i> ${m.name}${m.address?' · '+esc(m.address):(m.location?' · '+esc(m.location):'')}</p><div style="display:flex;flex-direction:column;gap:8px"><button class="dir-btn" style="width:100%" onclick="openDirections('apple',${id})">Apple Maps</button><button class="dir-btn" style="width:100%" onclick="openDirections('google',${id})">Google Maps</button><button class="dir-btn" style="width:100%" onclick="openDirections('waze',${id})">Waze</button></div></div></div></div>`); }
function openEventDirections(provider,di,id){ const trip=curTrip(); const d=trip.itinerary[di]; if(!d) return; const ev=d.events.find(e=>e.id===id); if(!ev) return; const q=(typeof ev.lat==='number'&&typeof ev.lng==='number')?(ev.lat+','+ev.lng):(ev.address||ev.name); window.open(directionsUrl(provider,q),'_blank'); }

function render(){
  saveState();
  const app=document.getElementById('app');
  if(view==='trips'){ renderTrips(app); return; }
  if(view==='newTrip'){ renderTrips(app); renderTripForm(); return; }
  if(view==='add'||view==='edit'){ renderTripShell(app); renderMemForm(); return; }
  if(view==='detail'){ renderTripShell(app); renderDetail(); return; }
  if(view==='addEvent'){ renderTripShell(app); renderEventForm(); return; }
  if(view==='addExpense'){ renderTripShell(app); renderExpenseForm(); return; }
  if(view==='editJournal'){ renderTripShell(app); renderJournalForm(); return; }
  renderTripShell(app);
}

function renderTrips(app){
  clearModal();
  const sL={past:'Past',upcoming:'Upcoming',active:'Current'}, sC={past:'#5F5E5A',upcoming:'#185FA5',active:'#0F6E56'};
  app.innerHTML=`
    <div class="trips-header"><h1>My destinations</h1><p>${trips.length} trip${trips.length!==1?'s':''} · each with its own itinerary, scrapbook, journal & budget</p></div>
    <div style="display:flex;gap:8px;padding:0 16px 2px;flex-wrap:wrap;align-items:center">
      <button class="btn-cancel" style="font-size:12px;display:flex;align-items:center;gap:5px" onclick="exportData()"><i class="ti ti-download"></i> Back up</button>
      <button class="btn-cancel" style="font-size:12px;display:flex;align-items:center;gap:5px" onclick="document.getElementById('import-inp').click()"><i class="ti ti-upload"></i> Restore</button>
      <input type="file" id="import-inp" accept=".json,application/json" style="display:none" onchange="importData(event)">
      <button class="btn-cancel" style="font-size:12px;display:flex;align-items:center;gap:5px" onclick="openTravelMap()"><i class="ti ti-map-2"></i> Travel map</button>
    </div>
    <div style="padding:0 16px 8px;font-size:11px;color:var(--color-text-tertiary)"><i class="ti ti-clock" style="font-size:12px;vertical-align:-2px"></i> ${lastBackupStr()}</div>
    <div class="trips-grid">
      ${trips.map(t=>`
        <div class="trip-card" onclick="openTrip(${t.id})">
          <div class="trip-cover" style="${t.cover?`background-image:url('${t.cover}');background-size:cover;background-position:center`:`background:${t.color}`}">${t.cover?'':`<span>${t.emoji}</span>`}<span class="trip-status" style="color:${sC[t.status]}">${sL[t.status]}</span><button class="trip-edit" onclick="event.stopPropagation();openEditTrip(${t.id})" aria-label="Edit destination"><i class="ti ti-edit"></i></button>${(()=>{const p=tripPhase(t);if(p.phase==='upcoming')return `<span class="trip-countdown">${p.days===1?'Tomorrow':'in '+p.days+' days'}</span>`;if(p.phase==='ongoing')return `<span class="trip-countdown" style="background:#0F6E56;color:#fff">Happening now</span>`;return '';})()}</div>
          <div class="trip-card-body">
            <div class="trip-card-name">${t.name}</div>
            <div class="trip-card-loc"><i class="ti ti-map-pin"></i>${t.where}</div>
            <div class="trip-card-foot"><span class="trip-card-dates">${tripDateStr(t)}</span><span class="trip-card-count"><i class="ti ti-photo"></i>${t.memories.length}</span></div>
          </div>
        </div>`).join('')}
      <div class="new-trip-card" onclick="openNewTrip()"><i class="ti ti-plus"></i><span>New destination</span></div>
    </div>
    <div class="footer-note">Wander · your trips are saved automatically on this device. <a href="#" onclick="resetData();return false" style="color:#C2692A">Reset to samples</a></div>`;
}

function modalWrap(inner){ return `<div class="overlay"><div class="modal">${inner}</div></div>`; }
function closeModal(){ editEvent=null; editingExpenseId=null; editingJournalId=null; view='shell'; render(); }
function showModal(html){ let m=document.getElementById('modal-root'); if(!m){ m=document.createElement('div'); m.id='modal-root'; document.body.appendChild(m);} m.innerHTML=html; }
function clearModal(){ const m=document.getElementById('modal-root'); if(m) m.innerHTML=''; }
function showWelcome(){ const feats=[['ti-calendar-event','Plan your itinerary','Map each day with times, places, directions and links.'],['ti-polaroid','Keep the memories','A scrapbook and photo gallery for every trip.'],['ti-checklist','Never forget a thing','Smart packing checklists tailored to each trip.'],['ti-wallet','Track your spending','See where your travel budget actually goes.']]; showModal(`<div class="overlay" style="align-items:center"><div class="modal" style="max-width:400px"><div style="text-align:center;padding:6px 2px 2px"><div style="font-size:46px;line-height:1;margin-bottom:8px">🧭</div><div style="font-family:Fraunces;font-size:26px;font-weight:600">Welcome to Wander</div><div style="color:var(--color-text-secondary);font-size:14px;margin-top:6px;margin-bottom:20px">Your trips, memories and plans — all in one place.</div></div><div style="display:flex;flex-direction:column;gap:14px;margin-bottom:22px">${feats.map(([i,t,s])=>`<div style="display:flex;gap:12px;align-items:flex-start"><div style="width:38px;height:38px;border-radius:10px;background:#FFF0E0;display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti ${i}" style="color:#C2692A;font-size:19px"></i></div><div><div style="font-weight:600;font-size:14px">${t}</div><div style="font-size:12px;color:var(--color-text-secondary);line-height:1.4">${s}</div></div></div>`).join('')}</div><button class="btn-save" style="width:100%" onclick="dismissWelcome()">Get started</button></div></div>`); }
function dismissWelcome(){ try{ localStorage.setItem('wander_onboarded','1'); }catch(e){} clearModal(); }

function renderTripForm(){
  const isEdit=!!editingTripId;
  const STATUS=[['upcoming','Upcoming'],['active','Current'],['past','Past']];
  showModal(`<div class="overlay"><div class="modal">
    <div class="modal-header"><h3>${isEdit?'Edit destination':'New destination'}</h3><button class="modal-close" onclick="view='trips';editingTripId=null;render()"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="field"><label>Trip name</label><input type="text" id="t-name" placeholder="e.g. Japan Adventure" value="${esc(tripDraft.name)}"></div>
      <div class="field"><label>Where</label><input type="text" id="t-where" placeholder="e.g. Tokyo & Kyoto" value="${esc(tripDraft.where)}"></div>
      <div class="row2"><div class="field"><label>Start date${isEdit?' (blank keeps current)':''}</label><input type="date" id="t-start" value="${esc(tripDraft.start)}"></div><div class="field"><label>End date${isEdit?' (blank keeps current)':''}</label><input type="date" id="t-end" value="${esc(tripDraft.end)}"></div></div>
      <div class="row2"><div class="field"><label>Status</label><select id="t-status">${STATUS.map(([k,l])=>`<option value="${k}" ${tripDraft.status===k?'selected':''}>${l}</option>`).join('')}</select></div><div class="field"><label>Trip type</label><select id="t-type">${TRIP_TYPES.map(([k,l])=>`<option value="${k}" ${(tripDraft.tripType||'general')===k?'selected':''}>${l}</option>`).join('')}</select></div></div>
      <div class="field"><label>Budget</label><input type="text" id="t-budget" placeholder="e.g. 3000" value="${esc(tripDraft.budget)}"></div>
      <div class="field"><label>Cover icon</label><div class="emoji-picker">${TRIP_EMOJIS.map(e=>`<button class="emoji-opt ${tripDraft.emoji===e?'sel':''}" onclick="pickEmoji('${e}',this)">${e}</button>`).join('')}</div></div>
      <div class="field"><label>Cover colour</label><div class="color-picker">${COVER_COLORS.map(c=>`<div class="color-opt ${tripDraft.color===c?'sel':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`).join('')}</div></div>
      <div class="field"><label>Cover photo (optional)</label>${tripDraft.cover?`<div style="position:relative;margin-bottom:8px"><img src="${tripDraft.cover}" style="width:100%;height:120px;object-fit:cover;border-radius:var(--border-radius-md)"><button type="button" class="btn-cancel" style="position:absolute;top:6px;right:6px;padding:4px 9px;font-size:12px;background:rgba(255,255,255,.9)" onclick="tripDraft.cover=null;renderTripForm()">Remove</button></div>`:''}<input type="file" id="cover-inp" accept="image/*" style="display:none" onchange="handleCoverFile(event)"><button type="button" class="btn-cancel" style="font-size:12px;display:inline-flex;align-items:center;gap:6px" onclick="document.getElementById('cover-inp').click()"><i class="ti ti-photo"></i> ${tripDraft.cover?'Change photo':'Add a cover photo'}</button></div>
      ${isEdit?`<button class="btn-cancel" style="margin-top:4px" onclick="duplicateTrip(${editingTripId})"><i class="ti ti-copy" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Duplicate this trip</button>`:''}
      ${isEdit?`<button class="btn-cancel" style="color:#A32D2D;border-color:#F0999550;margin-top:4px" onclick="deleteTrip(${editingTripId})"><i class="ti ti-trash" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Delete this destination</button>`:''}
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="view='trips';editingTripId=null;render()">Cancel</button><button class="btn-save" onclick="saveTrip()">${isEdit?'Save changes':'Create destination'}</button></div>
  </div></div>`);
}
function pickEmoji(e,b){ tripDraft.emoji=e; document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); }
function pickColor(c,b){ tripDraft.color=c; document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); }
function handleCoverFile(e){ const f=(e.target.files||[])[0]; if(!f||!f.type.startsWith('image/')){ e.target.value=''; return; } const r=new FileReader(); r.onload=ev=>{ tripDraft.cover=ev.target.result; renderTripForm(); }; r.readAsDataURL(f); e.target.value=''; }
function openNewTrip(){ editingTripId=null; tripDraft={name:'',where:'',emoji:'🗺️',color:COVER_COLORS[0],start:'',end:'',year:'',budget:'',status:'upcoming',tripType:'general',cover:null}; view='newTrip'; render(); }
function openEditTrip(id){ const t=trips.find(x=>x.id===id); if(!t) return; editingTripId=id; tripDraft={name:t.name,where:(t.where==='—'?'':t.where),emoji:t.emoji,color:t.color,start:/^\d{4}-/.test(t.start||'')?t.start:'',end:/^\d{4}-/.test(t.end||'')?t.end:'',year:t.year,budget:t.budget&&t.budget.total?String(t.budget.total):'',status:t.status||'upcoming',tripType:t.tripType||'general',cover:t.cover||null}; view='newTrip'; render(); }
function deleteTrip(id){ confirmModal('Delete this destination and everything in it (itinerary, scrapbook, journal, budget, photos, checklist)? This cannot be undone.', ()=>{ trips=trips.filter(t=>t.id!==id); if(currentTripId===id) currentTripId=null; editingTripId=null; view='trips'; clearModal(); render(); }); }
function duplicateTrip(id){ const t=trips.find(x=>x.id===id); if(!t) return; const opt=(idv,label,sub,on)=>`<label style="display:flex;gap:10px;align-items:flex-start;padding:9px 2px;cursor:pointer"><input type="checkbox" id="${idv}" ${on?'checked':''} style="margin-top:2px;width:18px;height:18px;flex-shrink:0;accent-color:#C2692A"><span><span style="font-weight:600;font-size:14px">${label}</span>${sub?`<br><span style="font-size:12px;color:var(--color-text-secondary)">${sub}</span>`:''}</span></label>`; showModal(`<div class="overlay"><div class="modal"><div class="modal-header"><h3>Duplicate trip</h3><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><div class="field"><label>New trip name</label><input type="text" id="dup-name" value="${esc(t.name+' (copy)')}"></div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--color-text-tertiary);margin:12px 0 2px">Choose what to copy</div>${opt('dup-itin','Itinerary','All days, events, times, links & map pins',true)}${opt('dup-chk','Checklist','Packing / to-do items (copied unchecked)',true)}${opt('dup-budget','Budget total','The overall budget amount',true)}${opt('dup-scrap','Scrapbook entries','Saved places, food, stays & notes',false)}${opt('dup-photos','Photos','Everything in the photo gallery',false)}${opt('dup-journal','Journal entries','Your written notes & moods',false)}${opt('dup-exp','Logged expenses','Individual spending entries',false)}</div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="doDuplicate(${id})">Create copy</button></div></div></div>`); }
function doDuplicate(id){ const t=trips.find(x=>x.id===id); if(!t) return; const chk=idv=>{const el=document.getElementById(idv);return !!(el&&el.checked);}; const nm=(document.getElementById('dup-name').value||'').trim()||(t.name+' (copy)'); const dc=x=>JSON.parse(JSON.stringify(x||[])); const clone={ id:nextTripId++, name:nm, where:t.where, emoji:t.emoji, color:t.color, cover:t.cover||null, tripType:t.tripType||'general', start:'', end:'', year:'', status:'upcoming', itinerary: chk('dup-itin')?dc(t.itinerary):[], nextEvId:t.nextEvId||1, memories: chk('dup-scrap')?dc(t.memories):[], nextMemId:t.nextMemId||1, journal: chk('dup-journal')?dc(t.journal):[], nextJrId:t.nextJrId||1, budget:{ total: chk('dup-budget')?((t.budget&&t.budget.total)||0):0, expenses: chk('dup-exp')?dc(t.budget&&t.budget.expenses):[], nextExpId:(t.budget&&t.budget.nextExpId)||1 }, photos: chk('dup-photos')?dc(t.photos):[], nextPhotoId:t.nextPhotoId||1, checklist: chk('dup-chk')?dc(t.checklist).map(i=>({...i,done:false,updatedAt:Date.now()})):[], nextChkId:t.nextChkId||1 }; trips.push(clone); currentTripId=clone.id; editingTripId=null; saveState(); view='shell'; activeTab='itinerary'; clearModal(); render(); }
function shareTrip(){ const t=curTrip(); if(!t) return; const lines=[]; lines.push('✈️ '+t.name); const meta=[t.where, tripDateStr(t)].filter(Boolean).join(' · '); if(meta) lines.push(meta); lines.push(''); if((t.itinerary||[]).length){ t.itinerary.forEach(d=>{ lines.push((d.day||'')+(d.date?' — '+d.date:'')); (d.events||[]).forEach(e=>{ lines.push('  '+((e.time&&e.time!=='—')?e.time+'  ':'')+e.name+(e.detail?' — '+e.detail:'')); }); lines.push(''); }); } else { lines.push('(No itinerary events yet.)'); lines.push(''); } lines.push('— Planned with Wander'); const text=lines.join('\n'); if(navigator.share){ navigator.share({title:t.name+' — itinerary', text}).catch(e=>{}); } else if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(()=>alert('Itinerary copied to clipboard — paste it into a message or email to share.')).catch(()=>shareFallback(text)); } else { shareFallback(text); } }
function shareFallback(text){ showModal(`<div class="overlay"><div class="modal"><div class="modal-header"><h3>Share itinerary</h3><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:10px">Copy the text below to share your itinerary.</p><textarea readonly rows="12" style="font-family:monospace;font-size:12px" onclick="this.select()">${esc(text)}</textarea></div><div class="modal-footer"><button class="btn-save" style="width:100%" onclick="closeModal()">Done</button></div></div></div>`); }
function emergencyNumbersHTML(cc,cname){ const e=EMERGENCY[cc]; const rows=[]; if(e){ if(e.all)rows.push(['Emergency (all)',e.all]); if(e.police)rows.push(['Police',e.police]); if(e.ambulance)rows.push(['Ambulance',e.ambulance]); if(e.fire)rows.push(['Fire',e.fire]); if(e.fire_ambulance)rows.push(['Fire & ambulance',e.fire_ambulance]); if(e.tourist)rows.push(['Tourist police',e.tourist]); if(e.alt)rows.push(['Also works',e.alt]); } else { rows.push(['Emergency (try)','112']); } const header=cname?('In '+esc(cname)):'Emergency numbers'; return `<div class="d-section"><i class="ti ti-urgent" style="color:#A32D2D"></i> ${header}</div>${!e?`<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">No verified numbers on file for this country — 112 works in many places. Please confirm locally.</div>`:''}<div style="display:flex;flex-direction:column;gap:8px">${rows.map(([l,n])=>`<a class="emg-call" href="tel:${n}"><span>${l}</span><span class="emg-num"><i class="ti ti-phone" style="font-size:14px"></i> ${n}</span></a>`).join('')}</div>`; }
function renderEmergencyFor(lat,lng,cc,cname,label){ const el=document.getElementById('emg-body'); if(!el) return; el.innerHTML=(label?`<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px"><i class="ti ti-map-pin" style="color:#C2692A;vertical-align:-2px"></i> ${esc(label)}</div>`:'')+emergencyNumbersHTML(cc,cname)+`<div id="emg-places" style="margin-top:16px"><div style="color:var(--color-text-tertiary);font-size:13px"><i class="ti ti-loader-2"></i> Finding nearby hospitals, police &amp; pharmacies…</div></div>`; fetchEmergencyPlaces(lat,lng); }
function emergencyNearMe(){ const btn=document.getElementById('emg-nearme'); if(!navigator.geolocation){ alert('Location isn\'t available on this device or browser.'); return; } if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Locating…'; } navigator.geolocation.getCurrentPosition(pos=>{ const la=pos.coords.latitude, lo=pos.coords.longitude; if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-check"></i> Using your location'; } fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+la+'&lon='+lo).then(r=>r.json()).then(d=>{ const cc=((d&&d.address&&d.address.country_code)||'').toUpperCase(); const cname=(d&&d.address&&d.address.country)||''; const label=(d&&d.display_name)?d.display_name:'Your current location'; renderEmergencyFor(la,lo,cc,cname,label); }).catch(e=>{ renderEmergencyFor(la,lo,'','','Your current location'); }); }, err=>{ if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-current-location"></i> Near me now'; } alert('Couldn\'t get your location. Allow location access, or use the trip destination info below.'); }, {enableHighAccuracy:true,timeout:10000}); }
function openEmergency(){ const t=curTrip(); if(!t) return; showModal(`<div class="overlay"><div class="modal"><div class="modal-header"><h3><i class="ti ti-urgent" style="color:#A32D2D;vertical-align:-2px"></i> Emergency &amp; safety</h3><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><button id="emg-nearme" class="btn-save" style="width:100%;margin-bottom:14px;background:#A32D2D" onclick="emergencyNearMe()"><i class="ti ti-current-location"></i> Near me now</button><div id="emg-body"><div style="color:var(--color-text-tertiary);font-size:13px"><i class="ti ti-loader-2"></i> Finding this trip\'s location…</div></div><div style="margin-top:16px;font-size:11px;color:var(--color-text-tertiary);border-top:0.5px solid var(--color-border-tertiary);padding-top:10px">This shows the trip\'s destination by default. Tap “Near me now” to use your live location. Data comes from public sources and can be out of date — in a real emergency, dial the local number and confirm on the spot.</div></div><div class="modal-footer"><button class="btn-save" style="width:100%" onclick="closeModal()">Done</button></div></div></div>`); if(typeof t._wlat==='number'&&t._cc){ renderEmergencyFor(t._wlat,t._wlng,t._cc,t._cname||'',t.where||''); return; } const q=t.where||''; if(!q){ const el=document.getElementById('emg-body'); if(el) el.innerHTML='<p style="font-size:14px">No trip location set. Tap “Near me now” above, or add a “Where” to this trip.</p>'; return; } fetch('https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=1&q='+encodeURIComponent(q)).then(r=>r.json()).then(d=>{ const el=document.getElementById('emg-body'); if(!d||!d[0]){ if(el) el.innerHTML='<p style="font-size:14px">Couldn\'t locate this destination. Tap “Near me now”, or set a more specific “Where”.</p>'; return; } const lat=parseFloat(d[0].lat),lng=parseFloat(d[0].lon); const cc=((d[0].address&&d[0].address.country_code)||'').toUpperCase(); const cname=(d[0].address&&d[0].address.country)||''; t._wlat=lat; t._wlng=lng; t._cc=cc; t._cname=cname; saveState(); renderEmergencyFor(lat,lng,cc,cname,t.where||''); }).catch(e=>{ const el=document.getElementById('emg-body'); if(el) el.innerHTML='<p style="font-size:14px">Couldn\'t load emergency info — check your connection, or tap “Near me now”.</p>'; }); }

function overviewBlock(trip){
  const cd=countdownStr(trip);
  const spent=(trip.budget.expenses||[]).reduce((a,x)=>a+(x.amount||0),0);
  const total=trip.budget.total||0;
  const photos=(trip.photos||[]).length;
  const mems=trip.memories.length;
  const chk=trip.checklist||[]; const cdone=chk.filter(i=>i.done).length;
  const sD=parseISO(trip.start), eD=parseISO(trip.end);
  const len=(sD&&eD)?(daysBetween(sD,eD)+1):null;
  const chips=[];
  if(len) chips.push(['ti-calendar',len+' day'+(len>1?'s':'')]);
  if(total>0) chips.push(['ti-wallet',money(spent)+' / '+money(total)]);
  chips.push(['ti-photo',photos+' photo'+(photos!==1?'s':'')]);
  chips.push(['ti-polaroid',mems+' '+(mems===1?'memory':'memories')]);
  if(chk.length) chips.push(['ti-checklist',cdone+'/'+chk.length+' packed']);
  const p=tripPhase(trip);
  const cdColor=p.phase==='ongoing'?'#0F6E56':(p.phase==='upcoming'?'#C2692A':'var(--color-text-tertiary)');
  const wx=trip._weather?weatherHTML(trip._weather):(trip.where?`<div class="ov-weather" style="color:var(--color-text-tertiary);font-size:12px"><i class="ti ti-cloud"></i> Loading weather for ${esc(trip.where)}…</div>`:'');
  return `<div class="overview">${cd?`<div class="ov-count" style="color:${cdColor}"><i class="ti ti-plane-tilt"></i> ${cd}</div>`:''}<div class="ov-chips">${chips.map(([i,t])=>`<div class="ov-chip"><i class="ti ${i}"></i> ${t}</div>`).join('')}</div>${wx}</div>`;
}
function wcodeInfo(code){ const m={0:['☀️','Clear'],1:['🌤️','Mostly clear'],2:['⛅','Partly cloudy'],3:['☁️','Cloudy'],45:['🌫️','Fog'],48:['🌫️','Fog'],51:['🌦️','Light drizzle'],53:['🌦️','Drizzle'],55:['🌦️','Drizzle'],61:['🌧️','Light rain'],63:['🌧️','Rain'],65:['🌧️','Heavy rain'],71:['🌨️','Light snow'],73:['🌨️','Snow'],75:['❄️','Heavy snow'],77:['🌨️','Snow'],80:['🌦️','Showers'],81:['🌧️','Showers'],82:['⛈️','Heavy showers'],85:['🌨️','Snow showers'],86:['🌨️','Snow showers'],95:['⛈️','Thunderstorm'],96:['⛈️','Thunderstorm'],99:['⛈️','Thunderstorm']}; return m[code]||['🌡️','—']; }

function downloadPhoto(id){ const trip=curTrip(); const p=(trip.photos||[]).find(x=>x.id===id); if(!p||!p.url) return; try{ const parts=p.url.split(','); const mime=(parts[0].match(/data:(.*?);base64/)||[])[1]||'image/jpeg'; const bin=atob(parts[1]); const arr=new Uint8Array(bin.length); for(let j=0;j<bin.length;j++)arr[j]=bin.charCodeAt(j); const blob=new Blob([arr],{type:mime}); const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=(p.caption?p.caption.slice(0,30).replace(/[^\w -]/g,''):'photo')+'.'+(mime.split('/')[1]||'jpg'); document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),60000); }catch(e){ alert('Could not download.'); } }

const CHK_CATS=[['before','Before I Leave','ti-home-check'],['docs','Documents','ti-id'],['packing','Packing','ti-luggage'],['groceries','Groceries','ti-shopping-cart'],['other','Other','ti-dots']];

function suggestedTemplateFor(trip){ const tt=trip.tripType||'general'; if(tt==='beach')return'beach'; if(tt==='lake')return'lake'; if(tt==='city')return'city'; if(tt==='roadtrip')return'roadtrip'; if(tt==='international')return'international'; const s=((trip.name||'')+' '+(trip.where||'')).toLowerCase(); if(/lake|cabin|cottage|kayak|canoe/.test(s))return'lake'; if(/beach|island|coast|tropical|resort|riviera|seaside/.test(s))return'beach'; if(/road ?trip|road-trip/.test(s))return'roadtrip'; return'essentials'; }

function ensureChecklist(trip){ if(!trip.checklist) trip.checklist=[]; if(trip.nextChkId==null) trip.nextChkId=(Math.max(0,...trip.checklist.map(i=>i.id||0))+1); }
function initChecklistSort(){ if(typeof Sortable==='undefined') return; document.querySelectorAll('.chk-sortlist').forEach(el=>{ Sortable.create(el,{handle:'.chk-drag',animation:150,onEnd:function(){ const cat=el.getAttribute('data-cat'); const ids=[...el.querySelectorAll('[data-chkid]')].map(n=>parseInt(n.getAttribute('data-chkid'))); const trip=curTrip(); if(!trip) return; const catItems=ids.map(id=>trip.checklist.find(i=>i.id===id)).filter(Boolean); let k=0; trip.checklist=trip.checklist.map(i=> i.cat===cat ? (catItems[k++]||i) : i); saveState(); }}); }); }
function planPanel(trip){

  const addRow=`<div style="margin-bottom:14px"><input type="text" id="chk-inp" placeholder="Add an item…" style="width:100%;margin-bottom:8px" onkeydown="if(event.key==='Enter'){event.preventDefault();addChkItem()}"><select id="chk-cat" style="width:100%;margin-bottom:8px">${CHK_CATS.map(([k,l])=>`<option value="${k}" ${lastChkCat===k?'selected':''}>${l}</option>`).join('')}</select><button class="btn-save" style="width:100%" onclick="addChkItem()"><i class="ti ti-plus" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>Add item</button></div>`;
  if(total===0){ const sug=suggestedTemplateFor(trip); const sugTpl=templates[sug]||CHK_TEMPLATES[sug]; const banner=`<div style="background:linear-gradient(135deg,#FFF0E0,#FBEAF0);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:15px;margin-bottom:14px"><div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:2px"><i class="ti ti-sparkles" style="color:#C2692A;vertical-align:-2px"></i> Suggested for this trip</div><div style="font-family:Fraunces;font-size:17px;font-weight:600;margin-bottom:10px">${sugTpl.label} checklist</div><button class="btn-save" style="width:100%" onclick="applyTemplate('${sug}')">Add ${sugTpl.items.length} items</button></div>`; return header+banner+addRow+`<div class="empty-state" style="padding-top:8px"><i class="ti ti-checklist"></i><p>Or add your own items above, or tap "Templates" for more starter lists.</p></div>`; }
  const groups=CHK_CATS.map(([key,label,icon])=>{ const items=list.filter(i=>i.cat===key).slice().sort((a,b)=>(a.done?1:0)-(b.done?1:0)); if(items.length===0) return ''; return `<div style="margin-bottom:16px"><div class="d-section" style="display:flex;align-items:center;gap:6px"><i class="ti ${icon}" style="font-size:15px;color:#C2692A"></i> ${label}</div><div class="chk-sortlist" data-cat="${key}">${items.map(i=>`<div class="chk-row ${i.done?'chk-done':''}" data-chkid="${i.id}"><span class="chk-drag" style="cursor:grab;color:var(--color-text-tertiary);touch-action:none;font-size:16px"><i class="ti ti-grip-vertical"></i></span><button class="chk-box ${i.done?'on':''}" onclick="toggleChk(${i.id})" aria-label="Toggle"><i class="ti ti-check"></i></button><span class="chk-text" onclick="toggleChk(${i.id})">${esc(i.text)}</span><button class="icon-btn" onclick="editChkItem(${i.id})" aria-label="Edit"><i class="ti ti-edit"></i></button><button class="icon-btn" onclick="delChkItem(${i.id})" aria-label="Delete"><i class="ti ti-trash"></i></button></div>`).join('')}</div></div>`; }).join('');
  return header+bar+actions+addRow+groups;

function uncheckAll(){ const trip=curTrip(); (trip.checklist||[]).forEach(i=>{ if(i.done){ i.done=false; i.updatedAt=Date.now(); } }); saveState(); render(); }

function addChkItem(){ const trip=curTrip(); ensureChecklist(trip); const inp=document.getElementById('chk-inp'); const text=(inp.value||'').trim(); const cat=gsel('chk-cat')||'other'; lastChkCat=cat; if(!text) return; trip.checklist.push({id:trip.nextChkId++,text,cat,done:false,updatedAt:Date.now()}); inp.value=''; saveState(); render(); setTimeout(()=>{ const el=document.getElementById('chk-inp'); if(el) el.focus(); },40); }

function saveChkEdit(id){ const trip=curTrip(); const i=(trip.checklist||[]).find(x=>x.id===id); if(i){ const t=(document.getElementById('chk-edit-text').value||'').trim(); if(!t){alert('Item cannot be empty.');return;} i.text=t; i.cat=gsel('chk-edit-cat')||'other'; i.updatedAt=Date.now(); } saveState(); view='shell'; activeTab='plan'; render(); }
function templateApplied(trip,key){ return (trip.checklist||[]).some(i=>i.src===key); }
function openTemplateChooser(){ const trip=curTrip(); ensureChecklist(trip); const ord=orderedTemplateKeys(); showModal(`<div class="overlay"><div class="modal"><div class="modal-header"><h3>Templates</h3><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px">Tap a template to add its items; tap again to remove them. Drag the handle to reorder, the pencil to edit — changes are saved for every future trip.</p><div id="tpl-sortlist" style="display:flex;flex-direction:column;gap:8px">${ord.map((k)=>{const v=templates[k];const on=templateApplied(trip,k);return `<div class="tpl-row" data-tplkey="${k}" style="display:flex;align-items:center;gap:6px"><span class="tpl-drag" style="cursor:grab;color:var(--color-text-tertiary);touch-action:none;padding:2px 2px;font-size:18px"><i class="ti ti-grip-vertical"></i></span><button class="dir-btn" style="flex:1;text-align:left;padding:12px 14px;font-size:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;${on?'border-color:#0F6E56;background:#EAF3DE':''}" onclick="toggleTemplate('${k}')"><span>${v.label} <span style="color:var(--color-text-tertiary);font-weight:400">· ${v.items.length}</span></span><span style="font-size:12px;font-weight:700;color:${on?'#A32D2D':'#0F6E56'}">${on?'Remove':'Add'}</span></button><button class="icon-btn" onclick="editTemplate('${k}')" aria-label="Edit template"><i class="ti ti-edit"></i></button>${!v.builtin?`<button class="icon-btn" onclick="deleteTemplate('${k}')" aria-label="Delete template"><i class="ti ti-trash"></i></button>`:''}</div>`;}).join('')}</div></div><div class="modal-footer"><button class="btn-save" style="width:100%" onclick="closeModal()">Done</button></div></div></div>`); setTimeout(initTemplateSort,30); }
function initTemplateSort(){ const el=document.getElementById('tpl-sortlist'); if(!el||typeof Sortable==='undefined') return; Sortable.create(el,{handle:'.tpl-drag',animation:150,onEnd:function(){ const keys=[...el.querySelectorAll('[data-tplkey]')].map(n=>n.getAttribute('data-tplkey')); templateOrder=keys; saveTemplates(); }}); }

function editTemplate(key){ const t=templates[key]; if(!t) return; const catLabel=k=>{const f=CHK_CATS.find(c=>c[0]===k);return f?f[1]:k;}; showModal(`<div class="overlay"><div class="modal"><div class="modal-header"><h3>Edit template</h3><button class="modal-close" onclick="openTemplateChooser()"><i class="ti ti-x"></i></button></div><div class="modal-body">${!t.builtin?`<div class="field"><label>Template name</label><input type="text" id="tpl-name" value="${esc(t.label)}"></div>`:`<div style="font-family:Fraunces;font-size:18px;font-weight:600;margin-bottom:10px">${t.label}</div>`}<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div class="d-section" style="margin:0">Items</div>${t.items.length>1?`<button class="chip" onclick="sortTemplateItems('${key}')"><i class="ti ti-sort-ascending" style="font-size:12px"></i> Sort A–Z</button>`:''}</div><div style="margin-bottom:12px">${t.items.length?t.items.map((it,idx)=>`<div class="chk-row"><span class="chk-text">${esc(it[0])} <span style="color:var(--color-text-tertiary);font-size:11px">· ${catLabel(it[1])}</span></span><button class="icon-btn" onclick="removeTemplateItem('${key}',${idx})" aria-label="Remove"><i class="ti ti-trash"></i></button></div>`).join(''):`<div style="color:var(--color-text-tertiary);font-size:13px;padding:8px 0">No items yet — add some below.</div>`}</div><div class="tag-input-row"><input type="text" id="tpl-add-text" placeholder="Add item…" onkeydown="if(event.key==='Enter'){event.preventDefault();addTemplateItem('${key}')}"><select id="tpl-add-cat" style="max-width:120px">${CHK_CATS.map(([kk,l])=>`<option value="${kk}">${l}</option>`).join('')}</select><button class="btn-save" style="padding:0 14px" onclick="addTemplateItem('${key}')">Add</button></div></div><div class="modal-footer">${t.builtin&&t._edited?`<button class="btn-cancel" onclick="resetTemplate('${key}')">Reset to default</button>`:'<span></span>'}<button class="btn-save" onclick="saveTemplateName('${key}')">Done</button></div></div></div>`); }
function addTemplateItem(key){ const t=templates[key]; if(!t) return; const inp=document.getElementById('tpl-add-text'); const text=(inp.value||'').trim(); if(!text) return; const cat=gsel('tpl-add-cat')||'other'; t.items.push([text,cat]); if(t.builtin) t._edited=true; saveTemplates(); editTemplate(key); }
function sortTemplateItems(key){ const t=templates[key]; if(!t) return; t.items.sort((a,b)=>a[0].toLowerCase().localeCompare(b[0].toLowerCase())); if(t.builtin) t._edited=true; saveTemplates(); editTemplate(key); }
function removeTemplateItem(key,idx){ const t=templates[key]; if(!t) return; t.items.splice(idx,1); if(t.builtin) t._edited=true; saveTemplates(); editTemplate(key); }
function saveTemplateName(key){ const t=templates[key]; if(t&&!t.builtin){ const el=document.getElementById('tpl-name'); if(el){ const nm=(el.value||'').trim(); if(nm) t.label=nm; } saveTemplates(); } openTemplateChooser(); }
function resetTemplate(key){ const def=CHK_TEMPLATES[key]; if(!def) return; templates[key]={label:def.label,builtin:true,items:def.items.map(x=>[...x])}; saveTemplates(); editTemplate(key); }
function deleteTemplate(key){ const t=templates[key]; if(!t||t.builtin) return; confirmModal('Delete the template "'+t.label+'"? (Trips that already used it keep their items.)', ()=>{ delete templates[key]; templateOrder=templateOrder.filter(k=>k!==key); saveTemplates(); openTemplateChooser(); }); }
function saveAsTemplatePrompt(){ const trip=curTrip(); if(!trip.checklist||trip.checklist.length===0){ alert('Add some items first, then save them as a template.'); return; } showModal(`<div class="overlay"><div class="modal"><div class="modal-header"><h3>Save as template</h3><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px">Save this trip's ${trip.checklist.length} checklist items as a reusable template you can apply to any future trip.</p><div class="field"><label>Template name</label><input type="text" id="tpl-new-name" placeholder="e.g. My Camping List"></div></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="doSaveAsTemplate()">Save template</button></div></div></div>`); }
function doSaveAsTemplate(){ const trip=curTrip(); const name=(document.getElementById('tpl-new-name').value||'').trim(); if(!name){ alert('Please give the template a name.'); return; } const items=(trip.checklist||[]).map(i=>[i.text,i.cat]); const key='user_'+Date.now(); templates[key]={label:'📋 '+name,builtin:false,items}; templateOrder.push(key); saveTemplates(); view='shell'; activeTab='plan'; render(); }
function budgetPanel(trip){
  const b=trip.budget; const spent=b.expenses.reduce((s,e)=>s+e.amount,0); const remaining=b.total-spent;
  const pct=b.total>0?Math.min(100,Math.round(spent/b.total*100)):0;
  const byCat={}; b.expenses.forEach(e=>{ byCat[e.cat]=(byCat[e.cat]||0)+e.amount; });
  const catRows=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([c,amt])=>{const m=EXP_CAT[c];const w=spent>0?Math.round(amt/spent*100):0;return `<div class="exp-row" style="flex-direction:column;align-items:stretch;gap:7px"><div style="display:flex;align-items:center;gap:10px"><div class="exp-icon" style="background:${m.bg}"><i class="ti ${m.icon}" style="color:${m.color};font-size:16px"></i></div><div class="exp-info"><div class="exp-name">${m.label}</div></div><div class="exp-amt">${money(amt)}</div></div><div class="progress" style="margin:0"><div class="progress-fill" style="width:${w}%;background:${m.color}"></div></div></div>`;}).join('');
  const txnRows=b.expenses.slice().reverse().map(e=>{const m=EXP_CAT[e.cat];return `<div class="exp-row"><div class="exp-icon" style="background:${m.bg}"><i class="ti ${m.icon}" style="color:${m.color};font-size:16px"></i></div><div class="exp-info"><div class="exp-name">${e.name}</div><div class="exp-cat">${m.label} · ${e.date}</div></div><div class="exp-amt">${money(e.amount)}</div>${(e.docs&&e.docs.length)?`<button class="icon-btn" onclick="showExpenseDocs(${e.id})" aria-label="Attachments"><i class="ti ti-paperclip"></i></button>`:''}<button class="icon-btn" onclick="openEditExpense(${e.id})" aria-label="Edit"><i class="ti ti-edit"></i></button><button class="exp-del" onclick="delExpense(${e.id})" aria-label="Delete"><i class="ti ti-trash"></i></button></div>`;}).join('');
  return `
    <div class="bd-summary">
      <div class="bd-stat"><div class="bd-label">Budget</div><div class="bd-val">${money(b.total)}</div></div>
      <div class="bd-stat"><div class="bd-label">Spent</div><div class="bd-val">${money(spent)}</div></div>
      <div class="bd-stat"><div class="bd-label">Remaining</div><div class="bd-val ${remaining<0?'over':'good'}">${money(remaining)}</div></div>
    </div>
    <div class="progress"><div class="progress-fill" style="width:${pct}%;background:${remaining<0?'#A32D2D':'#0F6E56'}"></div></div>
    ${b.expenses.length===0?`<div class="empty-state"><i class="ti ti-receipt"></i><p>No expenses logged yet.</p><button class="add-btn" onclick="openAddExpense()"><i class="ti ti-plus"></i> Add expense</button></div>`:`<div class="sub-head">By category</div>${catRows}<div class="sub-head" style="margin-top:16px">Transactions</div>${txnRows}`}`;
}

function renderDetail(){
  const trip=curTrip(); const m=trip.memories.find(x=>x.id===detailId); if(!m){view='shell';render();return;}
  const cm=CAT[m.cat];
  const stars=Array.from({length:5},(_,i)=>`<span style="color:${i<m.rating?'#EF9F27':'var(--color-text-tertiary)'};font-size:16px;">★</span>`).join('');
  let f='',ex='';
  if(m.cat==='food'){f=`${m.cuisine?`<div class="fact"><div class="fact-label">Cuisine</div><div class="fact-val">${m.cuisine}</div></div>`:''}${m.price?`<div class="fact"><div class="fact-label">Price</div><div class="fact-val">${m.price}</div></div>`:''}`;if(m.willReturn)ex=`<div><span class="return-badge ${m.willReturn==='yes'?'return-yes':'return-no'}"><i class="ti ti-${m.willReturn==='yes'?'check':'x'}" style="font-size:13px"></i> ${m.willReturn==='yes'?'Would return':'Would not return'}</span></div>`;}
  else if(m.cat==='sight'||m.cat==='culture'){f=`${m.built?`<div class="fact"><div class="fact-label">Built / Era</div><div class="fact-val">${m.built}</div></div>`:''}${m.duration?`<div class="fact"><div class="fact-label">Time spent</div><div class="fact-val">${m.duration}</div></div>`:''}`;}
  else if(m.cat==='place'){f=`${m.placeType?`<div class="fact"><div class="fact-label">Type</div><div class="fact-val">${m.placeType}</div></div>`:''}${m.timeOfDay?`<div class="fact"><div class="fact-label">Best time</div><div class="fact-val">${m.timeOfDay}</div></div>`:''}${m.transport?`<div class="fact" style="grid-column:1/-1"><div class="fact-label">How to get there</div><div class="fact-val">${m.transport}</div></div>`:''}${m.knownFor?`<div class="fact" style="grid-column:1/-1"><div class="fact-label">Known for</div><div class="fact-val">${m.knownFor}</div></div>`:''}`;}
  else if(m.cat==='stay'){f=`${m.propertyType?`<div class="fact"><div class="fact-label">Property type</div><div class="fact-val">${m.propertyType}</div></div>`:''}${m.pricePerNight?`<div class="fact"><div class="fact-label">Price / night</div><div class="fact-val">${m.pricePerNight}</div></div>`:''}${m.roomType?`<div class="fact"><div class="fact-label">Room type</div><div class="fact-val">${m.roomType}</div></div>`:''}${m.checkin&&m.checkout?`<div class="fact"><div class="fact-label">Dates</div><div class="fact-val">${fmtDate(m.checkin)} → ${fmtDate(m.checkout)}</div></div>`:''}${m.amenities?`<div class="fact" style="grid-column:1/-1"><div class="fact-label">Amenities</div><div class="fact-val">${m.amenities}</div></div>`:''}`;if(m.willReturn)ex=`<div><span class="return-badge ${m.willReturn==='yes'?'return-yes':'return-no'}"><i class="ti ti-${m.willReturn==='yes'?'check':'x'}" style="font-size:13px"></i> ${m.willReturn==='yes'?'Would stay again':'Would not stay again'}</span></div>`;}
  const docs=m.docs||[];
  const docsHTML=docs.length?`<div class="d-section">Documents & files <span style="color:var(--color-text-tertiary);font-weight:400">· ${docs.length}</span></div><div class="doc-list">${docs.map(d=>{const k=docKind(d.type);const th=(d.type==='img'&&d.url)?`<img src="${d.url}" alt="">`:`<i class="ti ${k.icon}"></i>`;const cl=d.url?`onclick="openDoc('${d.url}')" style="cursor:pointer"`:'';return `<div class="doc-open" ${cl}><div class="doc-icon ${k.cls}">${th}</div><div class="doc-info"><div class="doc-name">${d.name}</div><div class="doc-meta">${d.size||''}${d.url?' · tap to open':''}</div></div>${d.url?'<i class="ti ti-external-link" style="color:var(--color-text-tertiary);font-size:15px"></i>':''}</div>`;}).join('')}</div>`:'';
  showModal(`<div class="overlay"><div class="modal"><div class="modal-header"><h3>Memory details</h3><button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="detail-thumb" style="background:${cm.bg}"><span style="font-size:62px">${m.emoji||cm.emoji}</span><span class="detail-cat-pill" style="background:${cm.badge};color:${cm.text}">${cm.label}</span></div><div class="modal-body"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px"><div><div class="detail-name">${m.name}</div><div class="detail-loc"><i class="ti ti-map-pin"></i>${m.location}</div></div><div style="text-align:right;flex-shrink:0"><div>${stars}</div><div style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px">${m.date}</div></div></div>${(m.address||m.location||m.name)?`<div style="margin-top:12px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--color-text-tertiary);margin-bottom:6px">Get directions</div><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="dir-btn" onclick="openDirections('apple',${m.id})">Apple Maps</button><button class="dir-btn" onclick="openDirections('google',${m.id})">Google Maps</button><button class="dir-btn" onclick="openDirections('waze',${m.id})">Waze</button></div>${m.address?`<div style="font-size:12px;color:var(--color-text-secondary);margin-top:8px"><i class="ti ti-map-pin" style="font-size:13px;vertical-align:-2px"></i> ${m.address}</div>`:''}</div>`:''}${f?`<div class="d-section">Details</div><div class="facts-grid">${f}</div>`:''}${ex}${m.tags.length?`<div class="d-section">Tags</div><div style="display:flex;flex-wrap:wrap;gap:5px">${m.tags.map(t=>`<span class="mem-tag">#${t}</span>`).join('')}</div>`:''}${docsHTML}${m.notes?`<div class="d-section">Notes</div><div class="detail-note">${m.notes}</div>`:''}${m.caption?`<div class="d-section">Caption</div><div class="detail-note" style="font-style:italic">"${m.caption}"</div>`:''}</div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Back</button><button class="btn-save" onclick="openEdit(${m.id})"><i class="ti ti-edit" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>Edit</button></div></div></div>`);
}

oto?`<div style="position:relative;margin-bottom:8px"><img src="${_draft.photo}" style="width:100%;height:130px;object-fit:cover;border-radius:var(--border-radius-md)"><button type="button" class="btn-cancel" style="position:absolute;top:6px;right:6px;padding:4px 9px;font-size:12px;background:rgba(255,255,255,.9)" onclick="_draft.photo=null;renderMemForm()">Remove</button></div>`:''}<input type="file" id="mem-photo-inp" accept="image/*" style="display:none" onchange="handleMemPhoto(event)"><button type="button" class="btn-cancel" style="font-size:12px;display:inline-flex;align-items:center;gap:6px" onclick="document.getElementById('mem-photo-inp').click()"><i class="ti ti-photo"></i> ${_draft.photo?'Change photo':'Add a photo to the tile'}</button></div>${sf}${docsForm}<div class="field" style="margin-top:13px"><label>Personal notes</label><textarea id="d-notes" placeholder="Tips, feelings...">${esc(_draft.notes||'')}</textarea></div><div class="row2"><div class="field"><label>Rating</label><div class="star-row">${[1,2,3,4,5].map(n=>`<button class="star-btn ${n<=draftRating?'lit':''}" onclick="setRating(${n})">★</button>`).join('')}</div></div><div class="field"><label>Tags</label><div class="tag-input-row"><input type="text" id="tag-inp" placeholder="tag + Enter" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag()}"><button class="btn-cancel" style="padding:0 12px;font-size:12px" onclick="addTag()">Add</button></div><div class="mem-tags" id="tag-list" style="margin-top:6px">${draftTags.map((t,i)=>`<span class="tag-pill">#${t}<button onclick="removeTag(${i})" aria-label="Remove">×</button></span>`).join('')}</div></div></div></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveMemory()">${isEdit?'Save changes':'Add to scrapbook'}</button></div></div></div>`);

ns.&#10;Add a label with a pipe, e.g:&#10;Reservation | https://opentable.com/...&#10;https://maps.apple.com/...">${esc(linksText)}</textarea></div>${docsFieldHTML('Confirmations, tickets, boarding passes')}</div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveEvent()">${ed?'Save changes':'Add event'}</button></div></div></div>`);

function docRowHTML(d,i){const k=docKind(d.type);const th=(d.type==='img'&&d.url)?`<img src="${d.url}" alt="">`:`<i class="ti ${k.icon}"></i>`;return `<div class="doc-item"><div class="doc-icon ${k.cls}">${th}</div><div class="doc-info"><div class="doc-name">${d.name}</div><div class="doc-meta">${d.size||''}</div></div><button class="doc-rm" onclick="removeDoc(${i})" aria-label="Remove"><i class="ti ti-x"></i></button></div>`;}
function fileType(f){if(f.type.startsWith('image/'))return'img';if(f.type==='application/pdf'||/\.pdf$/i.test(f.name))return'pdf';if(/\.(xls|xlsx|csv)$/i.test(f.name))return'sheet';return'file';}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return Math.round(b/1024)+' KB';return (b/1048576).toFixed(1)+' MB';}
function handleFiles(e){const files=Array.from(e.target.files||[]);let p=files.length;if(!p)return;files.forEach(f=>{const doc={name:f.name,type:fileType(f),size:fmtSize(f.size)};const r=new FileReader();r.onload=ev=>{doc.url=ev.target.result;draftDocs.push(doc);p--;if(p===0)refreshDocList();};r.onerror=()=>{draftDocs.push(doc);p--;if(p===0)refreshDocList();};r.readAsDataURL(f);});e.target.value='';}
function refreshDocList(){const l=document.getElementById('doc-list');if(l)l.innerHTML=draftDocs.map((d,i)=>docRowHTML(d,i)).join('');}
function removeDoc(i){draftDocs.splice(i,1);refreshDocList();}
function setProp(p,v,btn){_draft[p]=v;btn.closest('.toggle-row').querySelectorAll('.toggle-opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function setCat(c){draftCat=c;_draft.cat=c;renderMemForm();}
function handleMemPhoto(e){ const f=(e.target.files||[])[0]; if(!f||!f.type.startsWith('image/')){ e.target.value=''; return; } const r=new FileReader(); r.onload=ev=>{ _draft.photo=ev.target.result; renderMemForm(); }; r.readAsDataURL(f); e.target.value=''; }
function setRating(n){draftRating=n;document.querySelectorAll('.star-btn').forEach((b,i)=>b.classList.toggle('lit',i<n));}
function addTag(){const inp=document.getElementById('tag-inp');if(!inp)return;const v=inp.value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');if(v&&!draftTags.includes(v))draftTags.push(v);inp.value='';const l=document.getElementById('tag-list');if(l)l.innerHTML=draftTags.map((t,i)=>`<span class="tag-pill">#${t}<button onclick="removeTag(${i})" aria-label="Remove">×</button></span>`).join('');}
function removeTag(i){draftTags.splice(i,1);const l=document.getElementById('tag-list');if(l)l.innerHTML=draftTags.map((t,j)=>`<span class="tag-pill">#${t}<button onclick="removeTag(${j})" aria-label="Remove">×</button></span>`).join('');}

function openAdd(){view='add';editingId=null;_draft={name:'',location:'',cat:'food',emoji:'',date:'',caption:'',tags:[],rating:0,notes:'',willReturn:''};draftTags=[];draftRating=0;draftCat='food';draftDocs=[];render();}
function openEdit(id){const m=curTrip().memories.find(x=>x.id===id);if(!m)return;view='edit';editingId=id;_draft={...m};draftTags=[...m.tags];draftRating=m.rating;draftCat=m.cat;draftDocs=(m.docs||[]).map(d=>({...d}));render();}
function openDetail(id){detailId=id;view='detail';render();}
function gv(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function gsel(id){const el=document.getElementById(id);return el?el.value:'';}
function saveMemory(){const trip=curTrip();const name=gv('d-name');if(!name){alert('Please add a name.');return;}const base={id:editingId||trip.nextMemId++,name,location:gv('d-location'),address:gv('d-address'),cat:draftCat,emoji:gv('d-emoji')||CAT[draftCat].emoji,date:gv('d-date'),caption:gv('d-caption'),notes:gv('d-notes'),tags:[...draftTags],rating:draftRating,loved:editingId?(trip.memories.find(x=>x.id===editingId)||{}).loved||false:false,willReturn:_draft.willReturn||'',docs:[...draftDocs],photo:_draft.photo||null,updatedAt:Date.now()};if(draftCat==='food')Object.assign(base,{cuisine:gv('d-cuisine'),price:_draft.price||''});if(draftCat==='sight'||draftCat==='culture')Object.assign(base,{built:gv('d-built'),duration:gv('d-duration')});if(draftCat==='place')Object.assign(base,{placeType:gsel('d-placeType'),timeOfDay:gsel('d-timeOfDay'),knownFor:gv('d-knownFor'),transport:gv('d-transport')});if(draftCat==='stay')Object.assign(base,{propertyType:gsel('d-propertyType'),roomType:gv('d-roomType'),checkin:gv('d-checkin'),checkout:gv('d-checkout'),pricePerNight:gv('d-ppn'),amenities:gv('d-amenities')});if(editingId){const i=trip.memories.findIndex(x=>x.id===editingId);if(i>-1)trip.memories[i]=base;}else trip.memories.unshift(base);view='shell';render();}
function deleteMem(id){const t=curTrip();t.memories=t.memories.filter(x=>x.id!==id);render();}
function toggleLove(id){const m=curTrip().memories.find(x=>x.id===id);if(m)m.loved=!m.loved;render();}
let _pinLat=null,_pinLng=null;
function useCurrentLocation(inputId,btnId,setPin){ if(!navigator.geolocation){ alert('Location isn\'t available on this device or browser.'); return; } inputId=inputId||'e-address'; btnId=btnId||'loc-btn'; const inp=document.getElementById(inputId); const btn=document.getElementById(btnId); if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> Locating…'; } navigator.geolocation.getCurrentPosition(pos=>{ const la=pos.coords.latitude, lo=pos.coords.longitude; if(setPin){ _pinLat=la; _pinLng=lo; } fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+la+'&lon='+lo).then(r=>r.json()).then(d=>{ if(inp) inp.value=(d&&d.display_name)?d.display_name:(la.toFixed(5)+', '+lo.toFixed(5)); if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-check" style="color:#0F6E56"></i> Location set'; } }).catch(e=>{ if(inp) inp.value=la.toFixed(5)+', '+lo.toFixed(5); if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-check" style="color:#0F6E56"></i> Location set'; } }); }, err=>{ if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-current-location"></i> Use my current location'; } alert('Couldn\'t get your location. Allow location access in your browser, or type the address instead.'); }, {enableHighAccuracy:true,timeout:10000}); }
function openAddEvent(){editEvent=null;draftDocs=[];_pinLat=null;_pinLng=null;view='addEvent';render();}
function initItineraryMap(){ try{ const el=document.getElementById('trip-map'); if(!el||typeof L==='undefined') return; if(mapInstance){ try{mapInstance.remove();}catch(e){} mapInstance=null; } const trip=curTrip(); if(!trip) return; const pts=[]; trip.itinerary.forEach(d=>d.events.forEach(e=>{ if(typeof e.lat==='number'&&typeof e.lng==='number'){ const c=EV_CAT[e.cat]||EV_CAT.activity; pts.push({lat:e.lat,lng:e.lng,name:e.name,time:e.time,day:d.day,color:c.text}); } })); if(pts.length===0) return; mapInstance=L.map(el,{scrollWheelZoom:false}); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(mapInstance); const bounds=[]; pts.forEach(p=>{ const icon=L.divIcon({className:'',html:'<div style="width:18px;height:18px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:#C2692A;border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.4)"></div>',iconSize:[18,18],iconAnchor:[9,16],popupAnchor:[0,-14]}); const m=L.marker([p.lat,p.lng],{icon}).addTo(mapInstance); const dd=p.lat+','+p.lng; const au='https://maps.apple.com/?daddr='+dd, gu='https://www.google.com/maps/dir/?api=1&destination='+dd, wu='https://waze.com/ul?ll='+dd+'&navigate=yes'; m.bindPopup('<b>'+p.name+'</b><br>'+p.day+(p.time&&p.time!=='—'?' &middot; '+p.time:'')+'<br><span style="font-size:11px;color:#57534E">Directions: <a href="'+au+'" target="_blank">Apple</a> &middot; <a href="'+gu+'" target="_blank">Google</a> &middot; <a href="'+wu+'" target="_blank">Waze</a></span>'); bounds.push([p.lat,p.lng]); }); if(bounds.length===1){ mapInstance.setView(bounds[0],14); } else { mapInstance.fitBounds(bounds,{padding:[30,30],maxZoom:15}); } setTimeout(()=>{ if(mapInstance) mapInstance.invalidateSize(); },120); }catch(e){} }
function parseLocQuery(q){ q=(q||'').trim(); let m=q.match(/^\s*(-?\d{1,3}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)\s*$/); if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])}; if(/https?:\/\//i.test(q)||/google|maps/i.test(q)){ m=q.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/); if(m) return {lat:+m[1],lng:+m[2]}; m=q.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/); if(m) return {lat:+m[1],lng:+m[2]}; m=q.match(/[?&](?:q|query|ll|destination|daddr)=(-?\d+\.\d+),(-?\d+\.\d+)/); if(m) return {lat:+m[1],lng:+m[2]}; m=q.match(/\/place\/([^\/@?]+)/); if(m){ try{ return {query:decodeURIComponent(m[1].replace(/\+/g,' ')).trim()}; }catch(e){ return {query:m[1].replace(/\+/g,' ').trim()}; } } m=q.match(/[?&](?:q|query|destination)=([^&]+)/); if(m&&!/^-?\d+\.\d+,/.test(m[1])){ try{ return {query:decodeURIComponent(m[1].replace(/\+/g,' ')).trim()}; }catch(e){ return {query:m[1].replace(/\+/g,' ').trim()}; } } return {query:null,shortlink:true}; } return {query:q}; }
function setEventCoords(evId,lat,lng){ const trip=curTrip(); if(!trip) return; let found=null; (trip.itinerary||[]).forEach(dd=>dd.events.forEach(e=>{ if(e.id===evId) found=e; })); if(found){ found.lat=lat; found.lng=lng; saveState(); if(activeTab==='itinerary'&&view==='shell') render(); } }
function geocodeAndPin(evId, query){ if(!query) return; const p=parseLocQuery(query); if(p.lat!=null){ setEventCoords(evId,p.lat,p.lng); return; } const q=p.query; if(!q) return; fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(q)).then(r=>r.json()).then(d=>{ if(d&&d[0]){ setEventCoords(evId,parseFloat(d[0].lat),parseFloat(d[0].lon)); } }).catch(e=>{}); }
function retryMissingPins(trip){ if(!trip) return; (trip.itinerary||[]).forEach(d=>(d.events||[]).forEach(e=>{ if(e.address && e.lat==null && !e._geoTried){ e._geoTried=true; geocodeAndPin(e.id, e.address); } })); }
function openEditEvent(di,eid){const trip=curTrip();const d=trip.itinerary[di];if(!d)return;const ev=d.events.find(e=>e.id===eid);if(!ev)return;editEvent={di,ev,day:d.day,date:d.date};draftDocs=(ev.docs||[]).map(x=>({...x}));_pinLat=null;_pinLng=null;view='addEvent';render();}
function parseEventLinks(){return (gv('e-links')||'').split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{const i=l.indexOf('|');let label,url;if(i>-1){label=l.slice(0,i).trim();url=l.slice(i+1).trim();}else{url=l;label='';}if(!/^https?:\/\//i.test(url))url='https://'+url;if(!label){try{label=new URL(url).hostname.replace(/^www\./,'');}catch(e){label=url;}}return{label,url};});}
function saveEvent(){const trip=curTrip();const name=gv('e-name');if(!name){alert('Please add an event name.');return;}const day=gv('e-day')||'Day 1';const date=fmtDateLong(gv('e-date'));const links=parseEventLinks();const time=gv('e-time')||'—';const cat=gsel('e-cat')||'activity';const detail=gv('e-detail');const address=gv('e-address');
  if(editEvent){const oldDay=trip.itinerary[editEvent.di];const prev=editEvent.ev;if(oldDay){oldDay.events=oldDay.events.filter(e=>e.id!==prev.id);}const ev={id:prev.id,time,name,detail,address,cat,links,docs:[...draftDocs],updatedAt:Date.now()};if(_pinLat!=null){ev.lat=_pinLat;ev.lng=_pinLng;}else if(address&&address===prev.address){ev.lat=prev.lat;ev.lng=prev.lng;}let dayObj=trip.itinerary.find(d=>d.day.toLowerCase()===day.toLowerCase());if(!dayObj){dayObj={day,date:date||(oldDay&&oldDay.date)||'',events:[]};trip.itinerary.push(dayObj);}else if(date){dayObj.date=date;}dayObj.events.push(ev);dayObj.events.sort((a,b)=>a.time.localeCompare(b.time));trip.itinerary=trip.itinerary.filter(d=>d.events.length>0);const q=address||(name+', '+trip.where);if(address&&(ev.lat==null)){geocodeAndPin(ev.id,q);}editEvent=null;draftDocs=[];_pinLat=null;_pinLng=null;view='shell';activeTab='itinerary';render();return;}
  const ev={id:trip.nextEvId++,time,name,detail,address,cat,links,docs:[...draftDocs],updatedAt:Date.now()};if(_pinLat!=null){ev.lat=_pinLat;ev.lng=_pinLng;}let dayObj=trip.itinerary.find(d=>d.day.toLowerCase()===day.toLowerCase());if(!dayObj){dayObj={day,date,events:[]};trip.itinerary.push(dayObj);}else if(date&&!dayObj.date){dayObj.date=date;}dayObj.events.push(ev);dayObj.events.sort((a,b)=>a.time.localeCompare(b.time));if(address&&ev.lat==null){geocodeAndPin(ev.id,address||(name+', '+trip.where));}draftDocs=[];_pinLat=null;_pinLng=null;view='shell';activeTab='itinerary';render();}
function delEvent(di,eid){const trip=curTrip();const d=trip.itinerary[di];d.events=d.events.filter(e=>e.id!==eid);if(d.events.length===0)trip.itinerary.splice(di,1);render();}
function pickMood(m,btn){jrMood=m;document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');}
function openEditJournal(id){const j=curTrip().journal.find(x=>x.id===id);if(!j)return;editingJournalId=id;jrMood=j.mood||'😊';view='editJournal';render();}
function renderJournalForm(){const j=curTrip().journal.find(x=>x.id===editingJournalId);if(!j){closeModal();return;}showModal(`<div class="overlay"><div class="modal"><div class="modal-header"><h3>Edit journal entry</h3><button class="modal-close" onclick="editingJournalId=null;closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><div class="field"><label>Where</label><input type="text" id="je-place" placeholder="e.g. Alfama District" value="${esc(j.place||'')}"></div><div class="field"><label>Entry</label><textarea id="je-text" rows="5">${esc(j.text||'')}</textarea></div><div class="field"><label>Mood</label><div class="mood-btns">${MOODS.map(m=>`<button class="mood-btn ${jrMood===m?'sel':''}" onclick="pickMood('${m}',this)">${m}</button>`).join('')}</div></div></div><div class="modal-footer"><button class="btn-cancel" onclick="editingJournalId=null;closeModal()">Cancel</button><button class="btn-save" onclick="saveJournalEdit()">Save changes</button></div></div></div>`);}
function saveJournalEdit(){const trip=curTrip();const j=trip.journal.find(x=>x.id===editingJournalId);if(j){const text=(document.getElementById('je-text').value||'').trim();if(!text){alert('Entry cannot be empty.');return;}j.text=text;j.place=(document.getElementById('je-place').value||'').trim();j.mood=jrMood;j.updatedAt=Date.now();}editingJournalId=null;jrMood='😊';view='shell';activeTab='journal';render();}
function saveJournal(){const trip=curTrip();const text=(document.getElementById('jr-text').value||'').trim();if(!text)return;const place=(document.getElementById('jr-place').value||'').trim();trip.journal.push({id:trip.nextJrId++,day:'New entry',place,mood:jrMood,text,updatedAt:Date.now()});jrMood='😊';render();}
function delJournal(id){const t=curTrip();t.journal=t.journal.filter(j=>j.id!==id);render();}
function openAddExpense(){editingExpenseId=null;draftDocs=[];view='addExpense';render();}
function openEditExpense(id){const e=curTrip().budget.expenses.find(x=>x.id===id);if(!e)return;editingExpenseId=id;draftDocs=(e.docs||[]).map(d=>({...d}));view='addExpense';render();}
function saveExpense(){const trip=curTrip();const name=gv('x-name');if(!name){alert('Please add a description.');return;}const amt=parseFloat((gv('x-amt')||'').replace(/[^0-9.]/g,''))||0;const cat=gsel('x-cat')||'food';const date=gv('x-date')||'—';
  if(editingExpenseId){const i=trip.budget.expenses.findIndex(x=>x.id===editingExpenseId);if(i>-1){trip.budget.expenses[i]={id:editingExpenseId,name,cat,amount:amt,date,docs:[...draftDocs],updatedAt:Date.now()};}editingExpenseId=null;draftDocs=[];view='shell';activeTab='budget';render();return;}
  trip.budget.expenses.push({id:trip.budget.nextExpId++,name,cat,amount:amt,date,docs:[...draftDocs],updatedAt:Date.now()});draftDocs=[];view='shell';activeTab='budget';render();}
function delExpense(id){const t=curTrip();t.budget.expenses=t.budget.expenses.filter(e=>e.id!==id);render();}
function setFilter(c){filterCat=c;render();}

loadState();
loadTemplates();
render();
try{ if(!localStorage.getItem('wander_onboarded')) showWelcome(); }catch(e){}
